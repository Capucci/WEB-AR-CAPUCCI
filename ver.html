<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Viewer - CapCreator</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      color: white;
      flex-direction: column;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .audio-control {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      z-index: 9999;
      cursor: pointer;
      background: rgba(0,0,0,0.7);
      border: 2px solid white;
      color: white;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .info {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Carregando experiência AR...</div>
  </div>
  
  <div class="info" id="info">Aguardando target...</div>
  <button class="audio-control" id="audioBtn">🔇</button>
  
  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ; autoStart: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    embedded>
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <!-- Targets serão injetados dinamicamente -->
    <div id="targets-container"></div>
    
    <audio id="audioElement" preload="auto" style="display: none;"></audio>
  </a-scene>

  <script>
    // ============================================
    // CARREGAR CONFIGURAÇÃO DO PROJETO
    // ============================================
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    
    if (!projectId) {
      document.getElementById('loading').innerHTML = '<div>❌ Projeto não encontrado</div>';
      setTimeout(() => window.location.href = 'index.html', 2000);
    }
    
    // Carregar projeto do localStorage
    const projetos = JSON.parse(localStorage.getItem('ar_projetos') || '[]');
    const projeto = projetos.find(p => p.id === projectId);
    
    if (!projeto) {
      document.getElementById('loading').innerHTML = '<div>❌ Projeto não encontrado</div>';
      setTimeout(() => window.location.href = 'index.html', 2000);
    }
    
    console.log('Projeto carregado:', projeto);
    
    // ============================================
    // CONFIGURAR CENA COM MÚLTIPLOS TARGETS
    // ============================================
    const scene = document.getElementById('scene');
    const container = document.getElementById('targets-container');
    
    // Construir string de targets para o Mind AR
    // Nota: Para múltiplos targets, precisaríamos de um arquivo .mind compilado com todos
    // Por enquanto, usamos o primeiro target como principal
    
    if (projeto.targets && projeto.targets.length > 0) {
      // Configurar o target principal (primeiro da lista)
      const targetUrl = `https://capucci.github.io/AR-CapCreator/assets/${projeto.targets[0].name}`;
      scene.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; autoStart: true;`);
    }
    
    // ============================================
    // CRIAR ENTIDADE DO MODELO/VÍDEO
    // ============================================
    const targetEntity = document.createElement('a-entity');
    targetEntity.setAttribute('mindar-image-target', 'targetIndex: 0');
    
    if (projeto.modelo) {
      // Adicionar modelo 3D
      const modeloUrl = `https://capucci.github.io/AR-CapCreator/assets/${projeto.modelo.name}`;
      const modeloEntity = document.createElement('a-entity');
      modeloEntity.setAttribute('gltf-model', modeloUrl);
      modeloEntity.setAttribute('animation-mixer', '');
      
      const pos = projeto.position || { scale: 2, x: 0, y: 0, z: 0, rotX: 0, rotY: 0, rotZ: 0 };
      modeloEntity.setAttribute('scale', `${pos.scale} ${pos.scale} ${pos.scale}`);
      modeloEntity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
      modeloEntity.setAttribute('rotation', `${pos.rotX} ${pos.rotY} ${pos.rotZ}`);
      
      targetEntity.appendChild(modeloEntity);
    }
    
    if (projeto.video) {
      // Adicionar vídeo com Chroma Key
      const videoUrl = `https://capucci.github.io/AR-CapCreator/assets/${projeto.video.name}`;
      const videoEntity = document.createElement('a-video');
      videoEntity.setAttribute('src', videoUrl);
      videoEntity.setAttribute('width', '2');
      videoEntity.setAttribute('height', '1.5');
      videoEntity.setAttribute('position', '0 1 0');
      
      // Chroma Key via shader (simplificado)
      if (projeto.video.chromaColor) {
        videoEntity.setAttribute('material', `shader: standard; transparent: true;`);
      }
      
      targetEntity.appendChild(videoEntity);
    }
    
    container.appendChild(targetEntity);
    
    // ============================================
    // CONTROLE DE ÁUDIO
    // ============================================
    const audioElement = document.getElementById('audioElement');
    const audioBtn = document.getElementById('audioBtn');
    let audioPlaying = false;
    let audioPausedTime = 0;
    
    if (projeto.audio) {
      const audioUrl = `https://capucci.github.io/AR-CapCreator/assets/${projeto.audio.name}`;
      audioElement.src = audioUrl;
      audioElement.loop = projeto.audio.loop || false;
    }
    
    function playAudio() {
      if (audioElement.src) {
        if (audioPausedTime > 0) audioElement.currentTime = audioPausedTime;
        audioElement.play().then(() => {
          audioPlaying = true;
          audioBtn.innerHTML = '🔊';
        }).catch(() => {});
      }
    }
    
    function pauseAudio() {
      if (audioPlaying) {
        audioPausedTime = audioElement.currentTime;
        audioElement.pause();
        audioPlaying = false;
        audioBtn.innerHTML = '🔇';
      }
    }
    
    // Eventos do target
    const mindarTarget = document.querySelector('[mindar-image-target]');
    if (mindarTarget) {
      mindarTarget.addEventListener('targetFound', () => {
        document.getElementById('info').innerHTML = '🎯 Target encontrado!';
        document.getElementById('info').style.background = 'rgba(40,167,69,0.9)';
        setTimeout(() => {
          document.getElementById('info').style.opacity = '0';
          setTimeout(() => document.getElementById('info').style.display = 'none', 1000);
        }, 2000);
        
        if (projeto.audio) playAudio();
      });
      
      mindarTarget.addEventListener('targetLost', () => {
        document.getElementById('info').innerHTML = '👋 Target perdido';
        document.getElementById('info').style.background = 'rgba(0,0,0,0.7)';
        document.getElementById('info').style.opacity = '1';
        document.getElementById('info').style.display = 'block';
        
        if (projeto.audio) pauseAudio();
      });
    }
    
    audioBtn.addEventListener('click', () => {
      if (audioPlaying) {
        pauseAudio();
      } else {
        playAudio();
      }
    });
    
    // Esconder loading
    setTimeout(() => {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    }, 2000);
  </script>
</body>
</html>
