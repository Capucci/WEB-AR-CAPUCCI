<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Viewer</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; }
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      color: white;
      flex-direction: column;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 9999;
    }
    .audio-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 2px solid white;
      color: white;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Carregando AR...</div>
  </div>
  
  <div class="info" id="info">🔍 Aponte para o target</div>
  <button class="audio-btn" id="audioBtn">🔇</button>
  
  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ; autoStart: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    embedded>
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <div id="target-container"></div>
    <audio id="audioElem" preload="auto"></audio>
  </a-scene>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    
    if (!projectId) {
      document.getElementById('loading').innerHTML = '<div>❌ Projeto não encontrado</div>';
      setTimeout(() => window.location.href = 'index.html', 2000);
    }
    
    const projetos = JSON.parse(localStorage.getItem('ar_projetos') || '[]');
    const projeto = projetos.find(p => p.id === projectId);
    
    if (!projeto) {
      document.getElementById('loading').innerHTML = '<div>❌ Projeto não encontrado</div>';
      setTimeout(() => window.location.href = 'index.html', 2000);
    }
    
    console.log('Projeto:', projeto);
    
    // Configurar target
    const targetUrl = `https://capucci.github.io/AR-CapCreator/assets/${projeto.target.name}`;
    document.getElementById('scene').setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; autoStart: true;`);
    
    // Criar entidade do modelo
    const container = document.getElementById('target-container');
    const targetEntity = document.createElement('a-entity');
    targetEntity.setAttribute('mindar-image-target', 'targetIndex: 0');
    
    const modeloUrl = `https://capucci.github.io/AR-CapCreator/assets/${projeto.modelo.name}`;
    const modeloEntity = document.createElement('a-entity');
    modeloEntity.setAttribute('gltf-model', modeloUrl);
    modeloEntity.setAttribute('animation-mixer', '');
    
    const config = projeto.config || { scale: 100, posY: 0, rotX: -90, rotY: 0 };
    modeloEntity.setAttribute('scale', `${config.scale} ${config.scale} ${config.scale}`);
    modeloEntity.setAttribute('position', `0 ${config.posY} 0`);
    modeloEntity.setAttribute('rotation', `${config.rotX} ${config.rotY} 0`);
    
    targetEntity.appendChild(modeloEntity);
    container.appendChild(targetEntity);
    
    // Áudio
    const audioElem = document.getElementById('audioElem');
    const audioBtn = document.getElementById('audioBtn');
    let audioPlaying = false;
    let audioPausedTime = 0;
    
    if (projeto.audio) {
      const audioUrl = `https://capucci.github.io/AR-CapCreator/assets/${projeto.audio.name}`;
      audioElem.src = audioUrl;
    }
    
    function playAudio() {
      if (audioElem.src) {
        if (audioPausedTime > 0) audioElem.currentTime = audioPausedTime;
        audioElem.play().then(() => {
          audioPlaying = true;
          audioBtn.innerHTML = '🔊';
        }).catch(() => {});
      }
    }
    
    function pauseAudio() {
      if (audioPlaying) {
        audioPausedTime = audioElem.currentTime;
        audioElem.pause();
        audioPlaying = false;
        audioBtn.innerHTML = '🔇';
      }
    }
    
    // Eventos do target
    const mindarTarget = document.querySelector('[mindar-image-target]');
    if (mindarTarget) {
      mindarTarget.addEventListener('targetFound', () => {
        document.getElementById('info').innerHTML = '✅ Target encontrado!';
        document.getElementById('info').style.background = 'rgba(40,167,69,0.9)';
        setTimeout(() => document.getElementById('info').style.opacity = '0', 2000);
        if (projeto.audio) playAudio();
      });
      
      mindarTarget.addEventListener('targetLost', () => {
        document.getElementById('info').innerHTML = '🔍 Aponte para o target';
        document.getElementById('info').style.background = 'rgba(0,0,0,0.7)';
        document.getElementById('info').style.opacity = '1';
        if (projeto.audio) pauseAudio();
      });
    }
    
    audioBtn.addEventListener('click', () => {
      if (audioPlaying) pauseAudio();
      else playAudio();
    });
    
    setTimeout(() => {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    }, 2000);
  </script>
</body>
</html>
