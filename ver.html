<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Multi-Viewer</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; }
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      color: white;
      flex-direction: column;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 9999;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Carregando AR Multi-Target...</div>
  </div>
  
  <div class="info" id="info">🔍 Aguardando target...</div>
  
  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ; autoStart: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    embedded>
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <div id="targets-container"></div>
  </a-scene>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    
    if (!projectId) {
      document.getElementById('loading').innerHTML = '<div>❌ Projeto não encontrado</div>';
      setTimeout(() => window.location.href = 'index.html', 2000);
    }
    
    const projetos = JSON.parse(localStorage.getItem('ar_projetos') || '[]');
    const projeto = projetos.find(p => p.id === projectId);
    
    if (!projeto) {
      document.getElementById('loading').innerHTML = '<div>❌ Projeto não encontrado</div>';
      setTimeout(() => window.location.href = 'index.html', 2000);
    }
    
    console.log('Projeto Multi-Target:', projeto);
    
    const container = document.getElementById('targets-container');
    const scene = document.getElementById('scene');
    
    // Construir string de targets para o Mind AR (todos os targets)
    // O Mind AR suporta múltiplos targets em um único arquivo .mind compilado
    // Para simplificar, vamos usar o primeiro target como principal
    
    projeto.targets.forEach((target, index) => {
      // Criar entidade para cada target
      const targetEntity = document.createElement('a-entity');
      targetEntity.setAttribute('mindar-image-target', `targetIndex: ${index}`);
      targetEntity.setAttribute('id', `target-${target.id}`);
      
      // Adicionar conteúdo baseado no tipo
      if (target.tipo === 'modelo3d' && target.arquivos.modelo) {
        const modeloUrl = `https://capucci.github.io/AR-CapCreator/assets/${target.arquivos.modelo}`;
        const modeloEntity = document.createElement('a-entity');
        modeloEntity.setAttribute('gltf-model', modeloUrl);
        modeloEntity.setAttribute('animation-mixer', '');
        
        const cfg = target.config || { scale: 100, posY: 0, rotX: -90, rotY: 0 };
        modeloEntity.setAttribute('scale', `${cfg.scale} ${cfg.scale} ${cfg.scale}`);
        modeloEntity.setAttribute('position', `0 ${cfg.posY} 0`);
        modeloEntity.setAttribute('rotation', `${cfg.rotX} ${cfg.rotY} 0`);
        
        targetEntity.appendChild(modeloEntity);
      }
      
      if (target.tipo === 'video' && target.arquivos.video) {
        const videoUrl = `https://capucci.github.io/AR-CapCreator/assets/${target.arquivos.video}`;
        const videoEntity = document.createElement('a-video');
        videoEntity.setAttribute('src', videoUrl);
        videoEntity.setAttribute('width', '2');
        videoEntity.setAttribute('height', '1.5');
        videoEntity.setAttribute('position', '0 1 0');
        videoEntity.setAttribute('loop', 'true');
        targetEntity.appendChild(videoEntity);
      }
      
      if (target.tipo === 'imagem' && target.arquivos.imagem) {
        const imgUrl = `https://capucci.github.io/AR-CapCreator/assets/${target.arquivos.imagem}`;
        const imgEntity = document.createElement('a-image');
        imgEntity.setAttribute('src', imgUrl);
        imgEntity.setAttribute('width', '2');
        imgEntity.setAttribute('height', '2');
        imgEntity.setAttribute('position', '0 1 0');
        targetEntity.appendChild(imgEntity);
      }
      
      if (target.tipo === 'texto') {
        const texto = target.config?.texto || 'Texto';
        const textEntity = document.createElement('a-text');
        textEntity.setAttribute('value', texto);
        textEntity.setAttribute('color', 'white');
        textEntity.setAttribute('align', 'center');
        textEntity.setAttribute('width', '3');
        textEntity.setAttribute('position', '0 1 0');
        targetEntity.appendChild(textEntity);
      }
      
      container.appendChild(targetEntity);
      
      // Adicionar evento para mostrar qual target foi encontrado
      targetEntity.addEventListener('targetFound', () => {
        document.getElementById('info').innerHTML = `✅ ${target.nome} encontrado!`;
        document.getElementById('info').style.background = 'rgba(40,167,69,0.9)';
        setTimeout(() => document.getElementById('info').style.opacity = '0', 1500);
        setTimeout(() => document.getElementById('info').style.opacity = '1', 2000);
      });
      
      targetEntity.addEventListener('targetLost', () => {
        document.getElementById('info').innerHTML = `🔍 ${target.nome} perdido`;
        document.getElementById('info').style.background = 'rgba(0,0,0,0.8)';
      });
    });
    
    // Configurar o primeiro target como principal (simplificado)
    if (projeto.targets.length > 0 && projeto.targets[0].arquivos.modelo) {
      // Para Mind AR, precisamos de um arquivo .mind compilado com todos os targets
      // Por enquanto, usamos uma URL de exemplo
      const targetUrl = `https://capucci.github.io/AR-CapCreator/assets/target.mind`;
      scene.setAttribute('mindar-image', `imageTargetSrc: ${targetUrl}; autoStart: true;`);
    }
    
    setTimeout(() => {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    }, 2000);
  </script>
</body>
</html>
