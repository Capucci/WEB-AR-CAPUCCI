<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR CapCreator - Editor Profissional</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      height: 100vh;
      overflow: hidden;
    }
    
    .container {
      display: flex;
      height: 100vh;
    }
    
    /* Barra lateral */
    .sidebar {
      width: 300px;
      background: #16213e;
      color: white;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    
    .sidebar-header {
      padding: 20px;
      background: #0f3460;
      border-bottom: 1px solid #e94560;
    }
    
    .sidebar-header h2 {
      color: #e94560;
      font-size: 18px;
    }
    
    .sidebar-header p {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
    
    .upload-section {
      padding: 20px;
      border-bottom: 1px solid #0f3460;
    }
    
    .upload-area {
      border: 2px dashed #0f3460;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 15px;
      transition: all 0.3s;
    }
    
    .upload-area:hover {
      border-color: #e94560;
      background: #0f3460;
    }
    
    .upload-area.has-file {
      border-color: #28a745;
      background: #1a3a1a;
    }
    
    .file-info {
      font-size: 11px;
      color: #aaa;
      margin-top: 5px;
    }
    
    .controls-section {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    
    .control-group {
      background: #0f3460;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    
    .control-group h3 {
      color: #e94560;
      font-size: 14px;
      margin-bottom: 15px;
    }
    
    .slider-item {
      margin-bottom: 12px;
    }
    
    .slider-item label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    
    input[type=range] {
      width: 100%;
      margin-top: 5px;
      background: #1a1a2e;
      height: 4px;
      border-radius: 2px;
    }
    
    .coord-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .coord-input {
      text-align: center;
    }
    
    .coord-input label {
      display: block;
      font-size: 11px;
      margin-bottom: 5px;
    }
    
    .coord-input input {
      width: 100%;
      padding: 6px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: white;
      border-radius: 5px;
      text-align: center;
    }
    
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
    }
    
    .btn-success {
      background: #28a745;
    }
    
    .btn-secondary {
      background: #0f3460;
    }
    
    /* Preview AR */
    .preview-area {
      flex: 1;
      position: relative;
      background: #000;
    }
    
    a-scene {
      width: 100%;
      height: 100%;
    }
    
    .info-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 100;
    }
    
    .result-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    
    .result-card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
    }
    
    .result-card .url {
      word-break: break-all;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      margin: 15px 0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Barra Lateral -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>🎮 EDITOR AR</h2>
        <p>Carregue o target e adicione elementos</p>
      </div>
      
      <div class="upload-section">
        <div class="upload-area" id="uploadTargetBtn">
          <div style="font-size: 32px;">🎯</div>
          <div><strong>1. Target (.mind)</strong></div>
          <div class="file-info" id="targetInfo">Clique para carregar</div>
        </div>
        
        <div class="upload-area" id="uploadModeloBtn">
          <div style="font-size: 32px;">📦</div>
          <div><strong>2. Modelo 3D (.glb)</strong></div>
          <div class="file-info" id="modeloInfo">Clique para adicionar</div>
        </div>
        
        <div class="upload-area" id="uploadAudioBtn">
          <div style="font-size: 32px;">🎵</div>
          <div><strong>3. Áudio (.mp3)</strong></div>
          <div class="file-info" id="audioInfo">Opcional</div>
        </div>
      </div>
      
      <div class="controls-section">
        <div class="control-group">
          <h3>📍 POSIÇÃO</h3>
          <div class="coord-group">
            <div class="coord-input"><label>X</label><input type="number" id="posX" step="0.05" value="0"></div>
            <div class="coord-input"><label>Y</label><input type="number" id="posY" step="0.05" value="0"></div>
            <div class="coord-input"><label>Z</label><input type="number" id="posZ" step="0.05" value="0"></div>
          </div>
        </div>
        
        <div class="control-group">
          <h3>🔄 ROTAÇÃO</h3>
          <div class="coord-group">
            <div class="coord-input"><label>X</label><input type="number" id="rotX" step="5" value="0"></div>
            <div class="coord-input"><label>Y</label><input type="number" id="rotY" step="5" value="0"></div>
            <div class="coord-input"><label>Z</label><input type="number" id="rotZ" step="5" value="0"></div>
          </div>
        </div>
        
        <div class="control-group">
          <h3>📏 ESCALA</h3>
          <div class="slider-item">
            <label>Tamanho: <span id="scaleVal">1.0</span></label>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1">
          </div>
        </div>
        
        <div class="control-group">
          <h3>🔊 ÁUDIO</h3>
          <select id="audioMode" style="width: 100%; padding: 8px; background: #1a1a2e; color: white; border: 1px solid #0f3460; border-radius: 5px;">
            <option value="loop">Tocar em Looping</option>
            <option value="once">Tocar uma só vez</option>
          </select>
        </div>
        
        <button class="btn" id="btnSalvarProjeto">💾 SALVAR PROJETO</button>
        <button class="btn btn-secondary" id="btnLimpar">🗑️ Limpar Elementos</button>
      </div>
    </div>
    
    <!-- Preview AR -->
    <div class="preview-area">
      <div class="info-bar" id="infoBar">🔍 Aguardando target...</div>
      
      <a-scene
        id="arScene"
        mindar-image="imageTargetSrc: ; autoStart: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: true"
        embedded>
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="targetContainer"></a-entity>
        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" intensity="1" position="1 2 1"></a-light>
      </a-scene>
    </div>
  </div>
  
  <!-- Modal de Resultado -->
  <div class="result-modal" id="resultModal">
    <div class="result-card">
      <h2 style="color: #28a745;">✅ PROJETO SALVO!</h2>
      <div class="url" id="resultUrl"></div>
      <div id="resultQr"></div>
      <button onclick="document.getElementById('resultModal').style.display='none'" style="margin-top: 15px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px;">Fechar</button>
    </div>
  </div>

  <script>
    // Dados do projeto
    let projetoAtual = {
      target: null,
      modelo: null,
      audio: null,
      config: {
        posX: 0, posY: 0, posZ: 0,
        rotX: 0, rotY: 0, rotZ: 0,
        scale: 1,
        audioMode: 'loop'
      }
    };
    
    // Referências
    const targetContainer = document.getElementById('targetContainer');
    const arScene = document.getElementById('arScene');
    const infoBar = document.getElementById('infoBar');
    
    // ============================================
    // FUNÇÕES DE RENDERIZAÇÃO
    // ============================================
    
    function renderizarCena() {
      targetContainer.innerHTML = '';
      
      if (!projetoAtual.modelo) return;
      
      const entity = document.createElement('a-entity');
      entity.setAttribute('position', `${projetoAtual.config.posX} ${projetoAtual.config.posY} ${projetoAtual.config.posZ}`);
      entity.setAttribute('scale', `${projetoAtual.config.scale} ${projetoAtual.config.scale} ${projetoAtual.config.scale}`);
      entity.setAttribute('rotation', `${projetoAtual.config.rotX} ${projetoAtual.config.rotY} ${projetoAtual.config.rotZ}`);
      entity.setAttribute('gltf-model', URL.createObjectURL(projetoAtual.modelo.file));
      entity.setAttribute('animation-mixer', '');
      
      targetContainer.appendChild(entity);
    }
    
    function atualizarConfig() {
      projetoAtual.config.posX = parseFloat(document.getElementById('posX').value);
      projetoAtual.config.posY = parseFloat(document.getElementById('posY').value);
      projetoAtual.config.posZ = parseFloat(document.getElementById('posZ').value);
      projetoAtual.config.rotX = parseFloat(document.getElementById('rotX').value);
      projetoAtual.config.rotY = parseFloat(document.getElementById('rotY').value);
      projetoAtual.config.rotZ = parseFloat(document.getElementById('rotZ').value);
      projetoAtual.config.scale = parseFloat(document.getElementById('scale').value);
      projetoAtual.config.audioMode = document.getElementById('audioMode').value;
      
      document.getElementById('scaleVal').innerText = projetoAtual.config.scale;
      
      renderizarCena();
    }
    
    // ============================================
    // FUNÇÕES DE UPLOAD
    // ============================================
    
    function uploadTarget() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.mind';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          projetoAtual.target = { name: file.name, file: file };
          document.getElementById('targetInfo').innerHTML = `✅ ${file.name}`;
          document.getElementById('uploadTargetBtn').classList.add('has-file');
          
          const url = URL.createObjectURL(file);
          arScene.setAttribute('mindar-image', `imageTargetSrc: ${url}; autoStart: true;`);
          infoBar.innerHTML = '✅ Target carregado! Aponte a câmera';
          setTimeout(() => {
            infoBar.innerHTML = '🔍 Aponte a câmera para o target';
          }, 3000);
        }
      };
      input.click();
    }
    
    function uploadModelo() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.glb,.gltf';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          projetoAtual.modelo = { name: file.name, file: file };
          document.getElementById('modeloInfo').innerHTML = `✅ ${file.name}`;
          document.getElementById('uploadModeloBtn').classList.add('has-file');
          renderizarCena();
        }
      };
      input.click();
    }
    
    function uploadAudio() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.mp3';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          projetoAtual.audio = { name: file.name, file: file };
          document.getElementById('audioInfo').innerHTML = `✅ ${file.name}`;
          document.getElementById('uploadAudioBtn').classList.add('has-file');
        }
      };
      input.click();
    }
    
    // ============================================
    // SALVAR PROJETO
    // ============================================
    
    function salvarProjeto() {
      if (!projetoAtual.target) {
        alert('❌ Carregue um target (.mind) primeiro!');
        return;
      }
      
      if (!projetoAtual.modelo) {
        alert('❌ Carregue um modelo 3D (.glb) primeiro!');
        return;
      }
      
      const projectId = Date.now().toString(36) + Math.random().toString(36).substr(2);
      
      const projeto = {
        id: projectId,
        nome: 'Projeto AR',
        data: new Date().toISOString(),
        target: { name: projetoAtual.target.name },
        modelo: { name: projetoAtual.modelo.name },
        audio: projetoAtual.audio ? { name: projetoAtual.audio.name } : null,
        config: projetoAtual.config
      };
      
      const projetos = JSON.parse(localStorage.getItem('ar_projetos') || '[]');
      projetos.push(projeto);
      localStorage.setItem('ar_projetos', JSON.stringify(projetos));
      
      const baseUrl = window.location.origin + window.location.pathname.replace('editor.html', '');
      const projectUrl = `${baseUrl}ver.html?id=${projectId}`;
      
      document.getElementById('resultUrl').innerHTML = projectUrl;
      const qrUrl = `https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=${encodeURIComponent(projectUrl)}&choe=UTF-8`;
      document.getElementById('resultQr').innerHTML = `<img src="${qrUrl}" style="max-width: 200px;">`;
      document.getElementById('resultModal').style.display = 'flex';
      
      navigator.clipboard.writeText(projectUrl);
    }
    
    function limparElementos() {
      if (confirm('Remover o modelo 3D?')) {
        projetoAtual.modelo = null;
        projetoAtual.audio = null;
        document.getElementById('modeloInfo').innerHTML = 'Clique para adicionar';
        document.getElementById('audioInfo').innerHTML = 'Opcional';
        document.getElementById('uploadModeloBtn').classList.remove('has-file');
        document.getElementById('uploadAudioBtn').classList.remove('has-file');
        targetContainer.innerHTML = '';
      }
    }
    
    // ============================================
    // EVENTOS
    // ============================================
    
    document.getElementById('uploadTargetBtn').onclick = uploadTarget;
    document.getElementById('uploadModeloBtn').onclick = uploadModelo;
    document.getElementById('uploadAudioBtn').onclick = uploadAudio;
    document.getElementById('btnSalvarProjeto').onclick = salvarProjeto;
    document.getElementById('btnLimpar').onclick = limparElementos;
    
    document.getElementById('posX').addEventListener('input', atualizarConfig);
    document.getElementById('posY').addEventListener('input', atualizarConfig);
    document.getElementById('posZ').addEventListener('input', atualizarConfig);
    document.getElementById('rotX').addEventListener('input', atualizarConfig);
    document.getElementById('rotY').addEventListener('input', atualizarConfig);
    document.getElementById('rotZ').addEventListener('input', atualizarConfig);
    document.getElementById('scale').addEventListener('input', atualizarConfig);
    document.getElementById('audioMode').addEventListener('change', atualizarConfig);
    
    // Inicializar
    atualizarConfig();
  </script>
</body>
</html>
