<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR CapCreator - Plataforma Profissional de RA</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      overflow: hidden;
      height: 100vh;
    }
    
    .app-container {
      display: flex;
      height: 100vh;
    }
    
    /* Barra Lateral - Cenas */
    .scenes-sidebar {
      width: 280px;
      background: #0f0f1a;
      color: white;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a3a;
    }
    
    .scenes-header {
      padding: 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3a;
    }
    
    .scenes-header h3 {
      color: #e94560;
      margin-bottom: 10px;
    }
    
    .btn-add-scene {
      background: #e94560;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }
    
    .scenes-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    
    .scene-item {
      background: #1a1a2e;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    
    .scene-item:hover {
      background: #2a2a3a;
    }
    
    .scene-item.active {
      border-left-color: #e94560;
      background: #2a2a3a;
    }
    
    .scene-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .scene-stats {
      font-size: 11px;
      color: #888;
    }
    
    .scene-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    
    .scene-actions button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 14px;
    }
    
    .scene-actions button:hover {
      color: #e94560;
    }
    
    /* Painel Central */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .ar-preview {
      flex: 2;
      background: #000;
      position: relative;
    }
    
    a-scene {
      width: 100%;
      height: 100%;
    }
    
    .controls-panel {
      flex: 1.5;
      background: #16213e;
      color: white;
      padding: 20px;
      overflow-y: auto;
      border-top: 1px solid #2a2a3a;
    }
    
    .editor-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      border-bottom: 1px solid #2a2a3a;
      padding-bottom: 10px;
    }
    
    .editor-tab {
      background: none;
      border: none;
      padding: 8px 16px;
      color: #aaa;
      cursor: pointer;
      border-radius: 5px;
    }
    
    .editor-tab.active {
      background: #e94560;
      color: white;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .upload-area {
      border: 2px dashed #2a2a3a;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 15px;
      transition: all 0.3s;
    }
    
    .upload-area:hover {
      border-color: #e94560;
      background: #1a1a2e;
    }
    
    .upload-area.has-file {
      border-color: #28a745;
      background: #1a3a1a;
    }
    
    .file-info {
      font-size: 11px;
      color: #aaa;
      margin-top: 5px;
    }
    
    .control-group {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    
    .control-group h4 {
      color: #e94560;
      margin-bottom: 15px;
    }
    
    .coord-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .coord-input {
      text-align: center;
    }
    
    .coord-input label {
      display: block;
      font-size: 11px;
      margin-bottom: 5px;
    }
    
    .coord-input input {
      width: 100%;
      padding: 6px;
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      color: white;
      border-radius: 5px;
      text-align: center;
    }
    
    input[type=range] {
      width: 100%;
      background: #2a2a3a;
      height: 4px;
      border-radius: 2px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      margin-top: 10px;
    }
    
    .btn-success {
      background: #28a745;
    }
    
    .result-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    
    .result-card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
    }
    
    .result-card .url {
      word-break: break-all;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="scenes-sidebar">
      <div class="scenes-header">
        <h3>🎬 CENAS</h3>
        <button class="btn-add-scene" id="btnAddScene">+ Nova Cena</button>
      </div>
      <div class="scenes-list" id="scenesList"></div>
    </div>
    
    <div class="editor-panel">
      <div class="ar-preview">
        <a-scene id="arScene" mindar-image="imageTargetSrc: ; autoStart: true;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true" embedded>
          <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
          <a-entity mindar-image-target="targetIndex: 0" id="targetContainer"></a-entity>
          <a-light type="ambient" intensity="0.5"></a-light>
          <a-light type="directional" intensity="1" position="1 2 1"></a-light>
        </a-scene>
      </div>
      
      <div class="controls-panel">
        <div class="editor-tabs">
          <button class="editor-tab active" data-tab="elementos">📦 Elementos</button>
          <button class="editor-tab" data-tab="ajustes">⚙️ Ajustes</button>
          <button class="editor-tab" data-tab="interacao">🔗 Interação</button>
        </div>
        
        <div class="tab-content active" id="tab-elementos">
          <div class="upload-area" id="uploadTargetBtn">
            <div style="font-size: 32px;">🎯</div>
            <div><strong>Target (.mind)</strong></div>
            <div class="file-info" id="targetInfo">Clique para carregar o target</div>
          </div>
          <div class="upload-area" id="uploadModeloBtn">
            <div style="font-size: 32px;">📦</div>
            <div><strong>Objeto 3D (.glb)</strong></div>
            <div class="file-info" id="modeloInfo">Clique para adicionar</div>
          </div>
          <div class="upload-area" id="uploadVideoBtn">
            <div style="font-size: 32px;">🎬</div>
            <div><strong>Vídeo (.mp4)</strong></div>
            <div class="file-info" id="videoInfo">Clique para adicionar</div>
          </div>
          <div class="upload-area" id="uploadImagemBtn">
            <div style="font-size: 32px;">🖼️</div>
            <div><strong>Imagem (.png/.jpg)</strong></div>
            <div class="file-info" id="imagemInfo">Clique para adicionar</div>
          </div>
          <div class="upload-area" id="uploadAudioBtn">
            <div style="font-size: 32px;">🎵</div>
            <div><strong>Áudio (.mp3)</strong></div>
            <div class="file-info" id="audioInfo">Clique para adicionar</div>
          </div>
        </div>
        
        <div class="tab-content" id="tab-ajustes">
          <div class="control-group">
            <h4>📍 Posição</h4>
            <div class="coord-group">
              <div class="coord-input"><label>X</label><input type="number" id="posX" step="0.05" value="0"></div>
              <div class="coord-input"><label>Y</label><input type="number" id="posY" step="0.05" value="0"></div>
              <div class="coord-input"><label>Z</label><input type="number" id="posZ" step="0.05" value="0"></div>
            </div>
          </div>
          <div class="control-group">
            <h4>🔄 Rotação</h4>
            <div class="coord-group">
              <div class="coord-input"><label>X</label><input type="number" id="rotX" step="5" value="0"></div>
              <div class="coord-input"><label>Y</label><input type="number" id="rotY" step="5" value="0"></div>
              <div class="coord-input"><label>Z</label><input type="number" id="rotZ" step="5" value="0"></div>
            </div>
          </div>
          <div class="control-group">
            <h4>📏 Escala</h4>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1">
            <label style="text-align: center; display: block;">Valor: <span id="scaleVal">1.0</span></label>
          </div>
        </div>
        
        <div class="tab-content" id="tab-interacao">
          <div class="control-group">
            <h4>🔊 Áudio</h4>
            <select id="audioMode" style="width: 100%; padding: 8px; background: #1a1a2e; color: white; border: 1px solid #2a2a3a; border-radius: 5px;">
              <option value="once">Tocar uma só vez</option>
              <option value="loop">Tocar em Looping</option>
            </select>
          </div>
        </div>
        
        <button class="btn-primary" id="btnSalvarCena">💾 Salvar Cena Atual</button>
        <button class="btn-primary btn-success" id="btnSalvarProjeto">🚀 SALVAR PROJETO COMPLETO</button>
      </div>
    </div>
  </div>
  
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <h2 style="color: #28a745;">✅ PROJETO SALVO!</h2>
      <div class="url" id="resultUrl"></div>
      <div id="resultQr"></div>
      <button onclick="document.getElementById('resultOverlay').style.display='none'" style="margin-top: 15px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px;">Fechar</button>
    </div>
  </div>

  <script>
    let cenas = [];
    let cenaAtualId = null;
    let cenaElementos = {
      target: null, modelo: null, video: null, imagem: null, audio: null,
      config: { posX: 0, posY: 0, posZ: 0, rotX: 0, rotY: 0, rotZ: 0, scale: 1, audioMode: 'loop' }
    };
    
    function adicionarCena() {
      const novaCena = {
        id: Date.now(),
        nome: `CENA ${String(cenas.length + 1).padStart(2, '0')}`,
        elementos: JSON.parse(JSON.stringify(cenaElementos))
      };
      cenas.push(novaCena);
      renderizarListaCenas();
      selecionarCena(novaCena.id);
    }
    
    function renderizarListaCenas() {
      const container = document.getElementById('scenesList');
      container.innerHTML = cenas.map(cena => `
        <div class="scene-item ${cenaAtualId === cena.id ? 'active' : ''}" onclick="selecionarCena(${cena.id})">
          <div class="scene-name">🎬 ${cena.nome}</div>
          <div class="scene-stats">${cena.elementos.modelo ? '📦 ' : ''}${cena.elementos.video ? '🎬 ' : ''}${cena.elementos.imagem ? '🖼️ ' : ''}</div>
          <div class="scene-actions">
            <button onclick="event.stopPropagation(); renomearCena(${cena.id})">✏️</button>
            <button onclick="event.stopPropagation(); excluirCena(${cena.id})">🗑️</button>
          </div>
        </div>
      `).join('');
    }
    
    function selecionarCena(id) {
      cenaAtualId = id;
      const cena = cenas.find(c => c.id === id);
      if (cena) {
        cenaElementos = cena.elementos;
        carregarInterface();
        renderizarCenaAR();
      }
      renderizarListaCenas();
    }
    
    function carregarInterface() {
      document.getElementById('posX').value = cenaElementos.config.posX;
      document.getElementById('posY').value = cenaElementos.config.posY;
      document.getElementById('posZ').value = cenaElementos.config.posZ;
      document.getElementById('rotX').value = cenaElementos.config.rotX;
      document.getElementById('rotY').value = cenaElementos.config.rotY;
      document.getElementById('rotZ').value = cenaElementos.config.rotZ;
      document.getElementById('scale').value = cenaElementos.config.scale;
      document.getElementById('scaleVal').innerText = cenaElementos.config.scale;
      document.getElementById('audioMode').value = cenaElementos.config.audioMode;
      
      if (cenaElementos.target) document.getElementById('targetInfo').innerHTML = `✅ ${cenaElementos.target.name}`;
      if (cenaElementos.modelo) document.getElementById('modeloInfo').innerHTML = `✅ ${cenaElementos.modelo.name}`;
      if (cenaElementos.video) document.getElementById('videoInfo').innerHTML = `✅ ${cenaElementos.video.name}`;
      if (cenaElementos.imagem) document.getElementById('imagemInfo').innerHTML = `✅ ${cenaElementos.imagem.name}`;
      if (cenaElementos.audio) document.getElementById('audioInfo').innerHTML = `✅ ${cenaElementos.audio.name}`;
    }
    
    function renderizarCenaAR() {
      const container = document.getElementById('targetContainer');
      container.innerHTML = '';
      if (!cenaElementos.modelo && !cenaElementos.video && !cenaElementos.imagem) return;
      
      const entity = document.createElement('a-entity');
      entity.setAttribute('position', `${cenaElementos.config.posX} ${cenaElementos.config.posY} ${cenaElementos.config.posZ}`);
      entity.setAttribute('scale', `${cenaElementos.config.scale} ${cenaElementos.config.scale} ${cenaElementos.config.scale}`);
      entity.setAttribute('rotation', `${cenaElementos.config.rotX} ${cenaElementos.config.rotY} ${cenaElementos.config.rotZ}`);
      
      if (cenaElementos.modelo) {
        entity.setAttribute('gltf-model', URL.createObjectURL(cenaElementos.modelo.file));
        entity.setAttribute('animation-mixer', '');
      } else if (cenaElementos.video) {
        entity.setAttribute('video', `src: ${URL.createObjectURL(cenaElementos.video.file)}; loop: true; autoplay: true`);
        entity.setAttribute('material', 'shader: standard');
        entity.setAttribute('geometry', 'primitive: plane; width: 2; height: 1.5');
      } else if (cenaElementos.imagem) {
        entity.setAttribute('image', `src: ${URL.createObjectURL(cenaElementos.imagem.file)}`);
        entity.setAttribute('geometry', 'primitive: plane; width: 2; height: 2');
      }
      container.appendChild(entity);
    }
    
    function salvarCenaAtual() {
      const cena = cenas.find(c => c.id === cenaAtualId);
      if (cena) {
        cena.elementos = JSON.parse(JSON.stringify(cenaElementos));
        renderizarListaCenas();
        alert(`✅ Cena "${cena.nome}" salva!`);
      }
    }
    
    function salvarProjetoCompleto() {
      const projetoId = Date.now().toString(36) + Math.random().toString(36).substr(2);
      const projeto = { id: projetoId, nome: 'Projeto AR', data: new Date().toISOString(), cenas: cenas.map(c => ({ id: c.id, nome: c.nome, elementos: { target: c.elementos.target ? { name: c.elementos.target.name } : null, modelo: c.elementos.modelo ? { name: c.elementos.modelo.name } : null, config: c.elementos.config } })) };
      const projetos = JSON.parse(localStorage.getItem('ar_projetos') || '[]');
      projetos.push(projeto);
      localStorage.setItem('ar_projetos', JSON.stringify(projetos));
      const url = `${window.location.origin}${window.location.pathname.replace('editor.html', '')}ver.html?id=${projetoId}`;
      document.getElementById('resultUrl').innerHTML = url;
      document.getElementById('resultQr').innerHTML = `<img src="https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(url)}">`;
      document.getElementById('resultOverlay').style.display = 'flex';
      navigator.clipboard.writeText(url);
    }
    
    function renomearCena(id) {
      const cena = cenas.find(c => c.id === id);
      if (cena) { const novoNome = prompt('Novo nome:', cena.nome); if (novoNome) { cena.nome = novoNome; renderizarListaCenas(); } }
    }
    
    function excluirCena(id) {
      if (confirm('Excluir esta cena?')) { cenas = cenas.filter(c => c.id !== id); if (cenaAtualId === id) cenaAtualId = cenas[0]?.id || null; renderizarListaCenas(); if (cenaAtualId) selecionarCena(cenaAtualId); }
    }
    
    function uploadFile(field, accept) {
      const input = document.createElement('input'); input.type = 'file'; input.accept = accept;
      input.onchange = (e) => { const file = e.target.files[0]; if (file) { cenaElementos[field] = { name: file.name, file: file }; document.getElementById(`${field}Info`).innerHTML = `✅ ${file.name}`; document.getElementById(`upload${field.charAt(0).toUpperCase() + field.slice(1)}Btn`).classList.add('has-file'); renderizarCenaAR(); } };
      input.click();
    }
    
    function uploadTarget() {
      const input = document.createElement('input'); input.type = 'file'; input.accept = '.mind';
      input.onchange = (e) => { const file = e.target.files[0]; if (file) { cenaElementos.target = { name: file.name, file: file }; document.getElementById('targetInfo').innerHTML = `✅ ${file.name}`; document.getElementById('uploadTargetBtn').classList.add('has-file'); const url = URL.createObjectURL(file); document.getElementById('arScene').setAttribute('mindar-image', `imageTargetSrc: ${url}; autoStart: true;`); } };
      input.click();
    }
    
    const updateConfig = () => {
      cenaElementos.config.posX = parseFloat(document.getElementById('posX').value);
      cenaElementos.config.posY = parseFloat(document.getElementById('posY').value);
      cenaElementos.config.posZ = parseFloat(document.getElementById('posZ').value);
      cenaElementos.config.rotX = parseFloat(document.getElementById('rotX').value);
      cenaElementos.config.rotY = parseFloat(document.getElementById('rotY').value);
      cenaElementos.config.rotZ = parseFloat(document.getElementById('rotZ').value);
      cenaElementos.config.scale = parseFloat(document.getElementById('scale').value);
      cenaElementos.config.audioMode = document.getElementById('audioMode').value;
      document.getElementById('scaleVal').innerText = cenaElementos.config.scale;
      renderizarCenaAR();
    };
    
    document.getElementById('posX').addEventListener('input', updateConfig);
    document.getElementById('posY').addEventListener('input', updateConfig);
    document.getElementById('posZ').addEventListener('input', updateConfig);
    document.getElementById('rotX').addEventListener('input', updateConfig);
    document.getElementById('rotY').addEventListener('input', updateConfig);
    document.getElementById('rotZ').addEventListener('input', updateConfig);
    document.getElementById('scale').addEventListener('input', updateConfig);
    document.getElementById('audioMode').addEventListener('change', updateConfig);
    
    document.getElementById('uploadTargetBtn').onclick = uploadTarget;
    document.getElementById('uploadModeloBtn').onclick = () => uploadFile('modelo', '.glb,.gltf');
    document.getElementById('uploadVideoBtn').onclick = () => uploadFile('video', '.mp4');
    document.getElementById('uploadImagemBtn').onclick = () => uploadFile('imagem', '.png,.jpg,.jpeg');
    document.getElementById('uploadAudioBtn').onclick = () => uploadFile('audio', '.mp3');
    document.getElementById('btnSalvarCena').onclick = salvarCenaAtual;
    document.getElementById('btnSalvarProjeto').onclick = salvarProjetoCompleto;
    document.getElementById('btnAddScene').onclick = adicionarCena;
    
    document.querySelectorAll('.editor-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      });
    });
    
    window.selecionarCena = selecionarCena;
    window.renomearCena = renomearCena;
    window.excluirCena = excluirCena;
    
    adicionarCena();
  </script>
</body>
</html>
