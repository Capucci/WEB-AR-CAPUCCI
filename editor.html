<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor AR - Versão Simplificada</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    .painel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 10px;
      z-index: 1000;
      max-width: 280px;
      font-size: 12px;
      pointer-events: auto;
    }
    .painel button {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 12px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
    }
    .painel input {
      width: 100%;
      margin: 5px 0;
      padding: 5px;
    }
    .slider {
      width: 100%;
      margin: 5px 0;
    }
    .info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      z-index: 1000;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="painel">
    <h3>🎮 Editor AR</h3>
    
    <div>
      <button id="btnTarget">1️⃣ Carregar Target (.mind)</button>
      <button id="btnModelo">2️⃣ Adicionar Modelo 3D</button>
      <button id="btnVideo">3️⃣ Adicionar Vídeo</button>
      <button id="btnImagem">4️⃣ Adicionar Imagem</button>
      <button id="btnTexto">5️⃣ Adicionar Texto</button>
      <button id="btnSalvar" style="background: #28a745;">💾 SALVAR PROJETO</button>
      <button id="btnLimpar">🗑️ Limpar</button>
    </div>
    
    <div style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;">
      <div>📐 Ajustes do elemento selecionado:</div>
      <div>Posição X: <span id="valX">0</span> <input type="range" id="sliderX" min="-3" max="3" step="0.05" value="0" class="slider"></div>
      <div>Posição Y: <span id="valY">0</span> <input type="range" id="sliderY" min="-2" max="4" step="0.05" value="0" class="slider"></div>
      <div>Posição Z: <span id="valZ">0</span> <input type="range" id="sliderZ" min="-3" max="3" step="0.05" value="0" class="slider"></div>
      <div>Escala: <span id="valScale">1</span> <input type="range" id="sliderScale" min="0.1" max="10" step="0.1" value="1" class="slider"></div>
      <div>Rotação X: <span id="valRotX">0</span> <input type="range" id="sliderRotX" min="-180" max="180" step="5" value="0" class="slider"></div>
      <div>Rotação Y: <span id="valRotY">0</span> <input type="range" id="sliderRotY" min="-180" max="180" step="5" value="0" class="slider"></div>
    </div>
    
    <div id="status" style="margin-top: 10px; color: #aaa; font-size: 11px;">Aguardando...</div>
  </div>
  
  <div class="info" id="info">🔍 Aponte para o target</div>
  
  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ; autoStart: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    embedded>
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0" id="targetContainer">
      <!-- Elementos serão adicionados aqui -->
    </a-entity>
    
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" intensity="1" position="1 2 1"></a-light>
  </a-scene>

  <script>
    // ============================================
    // VARIÁVEIS
    // ============================================
    let elementos = [];
    let nextId = 1;
    let elementoSelecionado = null;
    let targetFile = null;
    
    const targetContainer = document.getElementById('targetContainer');
    const scene = document.getElementById('scene');
    const infoDiv = document.getElementById('info');
    const statusDiv = document.getElementById('status');
    
    // ============================================
    // FUNÇÕES
    // ============================================
    
    function atualizarStatus(msg) {
      statusDiv.innerHTML = msg;
      console.log(msg);
    }
    
    function adicionarElemento(tipo, nome, icon, file = null, texto = '') {
      const id = nextId++;
      
      const elemento = {
        id: id,
        tipo: tipo,
        nome: nome,
        icon: icon,
        url: file ? URL.createObjectURL(file) : null,
        file: file,
        texto: texto,
        posX: 0,
        posY: 0,
        posZ: 0,
        scale: 1,
        rotX: 0,
        rotY: 0,
        rotZ: 0
      };
      
      elementos.push(elemento);
      renderizarCena();
      selecionarElemento(id);
      atualizarStatus(`✅ ${nome} adicionado!`);
    }
    
    function renderizarCena() {
      targetContainer.innerHTML = '';
      
      elementos.forEach(el => {
        const entity = document.createElement('a-entity');
        entity.setAttribute('id', `elem-${el.id}`);
        entity.setAttribute('position', `${el.posX} ${el.posY} ${el.posZ}`);
        entity.setAttribute('scale', `${el.scale} ${el.scale} ${el.scale}`);
        entity.setAttribute('rotation', `${el.rotX} ${el.rotY} ${el.rotZ}`);
        
        if (el.tipo === 'modelo3d' && el.url) {
          entity.setAttribute('gltf-model', el.url);
          entity.setAttribute('animation-mixer', '');
        } else if (el.tipo === 'video' && el.url) {
          entity.setAttribute('video', `src: ${el.url}; loop: true; autoplay: true`);
          entity.setAttribute('material', 'shader: standard');
          entity.setAttribute('geometry', 'primitive: plane; width: 2; height: 1.5');
        } else if (el.tipo === 'imagem' && el.url) {
          entity.setAttribute('image', `src: ${el.url}`);
          entity.setAttribute('geometry', 'primitive: plane; width: 2; height: 2');
        } else if (el.tipo === 'texto') {
          entity.setAttribute('text', `value: ${el.texto}; color: white; align: center; width: 3`);
        }
        
        targetContainer.appendChild(entity);
      });
    }
    
    function selecionarElemento(id) {
      const el = elementos.find(e => e.id === id);
      if (!el) return;
      
      elementoSelecionado = el;
      
      document.getElementById('sliderX').value = el.posX;
      document.getElementById('sliderY').value = el.posY;
      document.getElementById('sliderZ').value = el.posZ;
      document.getElementById('sliderScale').value = el.scale;
      document.getElementById('sliderRotX').value = el.rotX;
      document.getElementById('sliderRotY').value = el.rotY;
      
      document.getElementById('valX').innerText = el.posX;
      document.getElementById('valY').innerText = el.posY;
      document.getElementById('valZ').innerText = el.posZ;
      document.getElementById('valScale').innerText = el.scale;
      document.getElementById('valRotX').innerText = el.rotX;
      document.getElementById('valRotY').innerText = el.rotY;
      
      atualizarStatus(`🔧 Editando: ${el.nome}`);
    }
    
    function atualizarElementoSelecionado() {
      if (!elementoSelecionado) return;
      
      elementoSelecionado.posX = parseFloat(document.getElementById('sliderX').value);
      elementoSelecionado.posY = parseFloat(document.getElementById('sliderY').value);
      elementoSelecionado.posZ = parseFloat(document.getElementById('sliderZ').value);
      elementoSelecionado.scale = parseFloat(document.getElementById('sliderScale').value);
      elementoSelecionado.rotX = parseFloat(document.getElementById('sliderRotX').value);
      elementoSelecionado.rotY = parseFloat(document.getElementById('sliderRotY').value);
      
      document.getElementById('valX').innerText = elementoSelecionado.posX;
      document.getElementById('valY').innerText = elementoSelecionado.posY;
      document.getElementById('valZ').innerText = elementoSelecionado.posZ;
      document.getElementById('valScale').innerText = elementoSelecionado.scale;
      document.getElementById('valRotX').innerText = elementoSelecionado.rotX;
      document.getElementById('valRotY').innerText = elementoSelecionado.rotY;
      
      renderizarCena();
      selecionarElemento(elementoSelecionado.id);
    }
    
    function limparElementos() {
      if (confirm('Remover todos os elementos?')) {
        elementos = [];
        elementoSelecionado = null;
        renderizarCena();
        atualizarStatus('🗑️ Todos os elementos removidos');
      }
    }
    
    // ============================================
    // UPLOAD DE ARQUIVOS
    // ============================================
    function uploadArquivo(tipo, accept, nomePadrao, icon) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = accept;
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          adicionarElemento(tipo, file.name, icon, file);
        }
      };
      input.click();
    }
    
    function uploadTarget() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.mind';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          targetFile = file;
          const url = URL.createObjectURL(file);
          scene.setAttribute('mindar-image', `imageTargetSrc: ${url}; autoStart: true;`);
          atualizarStatus(`🎯 Target carregado: ${file.name}`);
          infoDiv.innerHTML = '✅ Target carregado! Aponte a câmera';
          setTimeout(() => {
            infoDiv.innerHTML = '🔍 Aponte para o target';
          }, 3000);
        }
      };
      input.click();
    }
    
    // ============================================
    // SALVAR PROJETO
    // ============================================
    function salvarProjeto() {
      if (!targetFile) {
        alert('❌ Carregue um target .mind primeiro!');
        return;
      }
      
      const projectId = Date.now().toString(36) + Math.random().toString(36).substr(2);
      
      const projeto = {
        id: projectId,
        nome: 'Projeto AR',
        data: new Date().toISOString(),
        target: { name: targetFile.name },
        elementos: elementos.map(el => ({
          tipo: el.tipo,
          nome: el.nome,
          texto: el.texto,
          posX: el.posX,
          posY: el.posY,
          posZ: el.posZ,
          scale: el.scale,
          rotX: el.rotX,
          rotY: el.rotY,
          rotZ: el.rotZ
        }))
      };
      
      const projetos = JSON.parse(localStorage.getItem('ar_projetos') || '[]');
      projetos.push(projeto);
      localStorage.setItem('ar_projetos', JSON.stringify(projetos));
      
      const baseUrl = window.location.origin + window.location.pathname.replace('editor.html', '');
      const projectUrl = `${baseUrl}ver.html?id=${projectId}`;
      
      alert(`✅ Projeto salvo!\n\nLink: ${projectUrl}\n\nCopie este link para compartilhar!`);
      navigator.clipboard.writeText(projectUrl);
      
      // Abrir em nova aba
      window.open(projectUrl, '_blank');
    }
    
    // ============================================
    // EVENTOS DOS BOTÕES
    // ============================================
    document.getElementById('btnTarget').onclick = uploadTarget;
    document.getElementById('btnModelo').onclick = () => uploadArquivo('modelo3d', '.glb,.gltf', 'Modelo 3D', '📦');
    document.getElementById('btnVideo').onclick = () => uploadArquivo('video', '.mp4', 'Vídeo', '🎬');
    document.getElementById('btnImagem').onclick = () => uploadArquivo('imagem', '.png,.jpg,.jpeg', 'Imagem', '🖼️');
    document.getElementById('btnTexto').onclick = () => {
      const texto = prompt('Digite o texto:');
      if (texto) {
        adicionarElemento('texto', texto.substring(0, 20), '📝', null, texto);
      }
    };
    document.getElementById('btnSalvar').onclick = salvarProjeto;
    document.getElementById('btnLimpar').onclick = limparElementos;
    
    // Eventos dos sliders
    document.getElementById('sliderX').oninput = atualizarElementoSelecionado;
    document.getElementById('sliderY').oninput = atualizarElementoSelecionado;
    document.getElementById('sliderZ').oninput = atualizarElementoSelecionado;
    document.getElementById('sliderScale').oninput = atualizarElementoSelecionado;
    document.getElementById('sliderRotX').oninput = atualizarElementoSelecionado;
    document.getElementById('sliderRotY').oninput = atualizarElementoSelecionado;
    
    // Evento de clique nos elementos da cena (para selecionar)
    function setupClickHandlers() {
      document.querySelectorAll('[mindar-image-target] a-entity').forEach(el => {
        el.addEventListener('click', () => {
          const id = parseInt(el.id.replace('elem-', ''));
          selecionarElemento(id);
        });
      });
    }
    
    atualizarStatus('✅ Editor carregado! Clique em "Carregar Target" para começar.');
  </script>
</body>
</html>
